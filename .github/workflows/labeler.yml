name: "Pull request labeler"

# Runs on PR open/sync from forks via the safer pull_request_target trigger.
# labeler@v5 needs write permission on PR metadata.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
